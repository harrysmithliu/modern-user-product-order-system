name: Deploy Sandbox EC2 Online

on:
  push:
    branches:
      - sandbox-ec2-online
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SANDBOX_EC2_SSH_KEY }}

      - name: Add host to known_hosts
        run: ssh-keyscan -H "${{ secrets.SANDBOX_EC2_HOST }}" >> ~/.ssh/known_hosts

      - name: Sync repo and deploy remotely
        env:
          REMOTE_HOST: ${{ secrets.SANDBOX_EC2_HOST }}
          REMOTE_USER: ${{ secrets.SANDBOX_EC2_USER }}
          REMOTE_APP_DIR: ${{ secrets.SANDBOX_EC2_APP_DIR }}
          REMOTE_ENV_FILE: ${{ secrets.SANDBOX_EC2_ENV_FILE }}
          REMOTE_BRANCH: ${{ vars.SANDBOX_EC2_BRANCH || 'sandbox-ec2-online' }}
        run: |
          ssh "${REMOTE_USER}@${REMOTE_HOST}" "mkdir -p '${REMOTE_APP_DIR}'"
          ssh "${REMOTE_USER}@${REMOTE_HOST}" "if [ ! -d '${REMOTE_APP_DIR}/.git' ]; then git clone 'https://github.com/${{ github.repository }}.git' '${REMOTE_APP_DIR}'; fi"
          ssh "${REMOTE_USER}@${REMOTE_HOST}" "cd '${REMOTE_APP_DIR}' && git fetch origin && git checkout '${REMOTE_BRANCH}' && git pull origin '${REMOTE_BRANCH}'"
          ssh "${REMOTE_USER}@${REMOTE_HOST}" "cat > '${REMOTE_APP_DIR}/infra/aws/sandbox-ec2/.env.ec2.local' <<'EOF'
${REMOTE_ENV_FILE}
EOF"
          ssh "${REMOTE_USER}@${REMOTE_HOST}" "cd '${REMOTE_APP_DIR}' && bash infra/aws/sandbox-ec2/deploy.sh infra/aws/sandbox-ec2/.env.ec2.local"
