name: CI

on:
  push:
    branches:
      - main
      - sandbox
      - dev
      - "dev-*"
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run build

  compose-config:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker compose --env-file infra/aws/sandbox-ec2/env.example -f infra/aws/sandbox-ec2/docker-compose.yml config >/dev/null
      - run: docker compose -f infra/docker/docker-compose.dev.yml config >/dev/null
      - run: docker compose -f infra/docker/docker-compose.sandbox.yml config >/dev/null

  python-services:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - gateway
          - services/user-service
          - services/product-service
          - services/notification-service
    defaults:
      run:
        working-directory: ${{ matrix.service }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -r requirements-dev.txt
      - run: python -m pytest tests
      - run: python -m compileall app

  order-service:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/order-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
      - run: mvn -q verify

  docker-builds:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: frontend
            dockerfile: frontend/Dockerfile
            build_args: --build-arg VITE_API_BASE_URL=/api
          - name: gateway
            dockerfile: gateway/Dockerfile
            build_args:
          - name: user-service
            dockerfile: services/user-service/Dockerfile
            build_args:
          - name: product-service
            dockerfile: services/product-service/Dockerfile
            build_args:
          - name: order-service
            dockerfile: services/order-service/Dockerfile
            build_args:
          - name: notification-service
            dockerfile: services/notification-service/Dockerfile
            build_args:
    steps:
      - uses: actions/checkout@v4
      - run: docker build ${{ matrix.build_args }} -f ${{ matrix.dockerfile }} -t ci/${{ matrix.name }}:test .
