global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090

  # Placeholder service jobs for the next metrics iteration.
  # These targets assume future service-level Prometheus endpoints
  # or sidecar/exporter support in sandbox and production environments.
  - job_name: modern-upo-fastapi-sandbox
    metrics_path: /metrics
    static_configs:
      - targets:
          - host.docker.internal:8000
          - host.docker.internal:8001
          - host.docker.internal:8002

  - job_name: modern-upo-order-service-sandbox
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - host.docker.internal:8080

  - job_name: modern-upo-fastapi-dev
    metrics_path: /metrics
    static_configs:
      - targets:
          - host.docker.internal:8010
          - host.docker.internal:8011
          - host.docker.internal:8012

  - job_name: modern-upo-order-service-dev
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - host.docker.internal:8081
