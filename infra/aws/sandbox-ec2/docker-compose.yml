services:
  reverse-proxy:
    image: nginx:1.27-alpine
    container_name: modern-upo-online-nginx
    restart: unless-stopped
    depends_on:
      frontend:
        condition: service_started
      gateway:
        condition: service_started
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/active.conf:/etc/nginx/conf.d/default.conf:ro
      - ./runtime/certbot/www:/var/www/certbot
      - ./runtime/letsencrypt:/etc/letsencrypt

  frontend:
    image: upo-frontend:online
    build:
      context: ../../..
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_BASE_URL: /api
    restart: unless-stopped
    depends_on:
      gateway:
        condition: service_started

  mysql:
    image: mysql:8.4
    container_name: modern-upo-online-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    command: ["mysqld", "--character-set-server=utf8mb4", "--collation-server=utf8mb4_0900_ai_ci"]
    volumes:
      - mysql_data:/var/lib/mysql
      - ../../docker/mysql/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -p$$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 12

  redis:
    image: redis:7.0
    container_name: modern-upo-online-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data

  rabbitmq:
    image: rabbitmq:3-management
    container_name: modern-upo-online-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

  mongodb:
    image: mongo:7
    container_name: modern-upo-online-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
    volumes:
      - mongodb_data:/data/db

  user-service:
    image: upo-user-service:online
    build:
      context: ../../..
      dockerfile: services/user-service/Dockerfile
    restart: unless-stopped
    environment:
      USER_SERVICE_DB_HOST: mysql
      USER_SERVICE_DB_PORT: 3306
      USER_SERVICE_DB_NAME: h_user_db
      USER_SERVICE_DB_USER: ${MYSQL_APP_USER}
      USER_SERVICE_DB_PASSWORD: ${MYSQL_APP_PASSWORD}
      USER_SERVICE_JWT_SECRET: ${SANDBOX_JWT_SECRET}
      USER_SERVICE_JWT_ALGORITHM: HS256
      USER_SERVICE_JWT_EXPIRE_MINUTES: 120
      USER_SERVICE_REDIS_ENABLED: "true"
      USER_SERVICE_REDIS_HOST: redis
      USER_SERVICE_REDIS_PORT: 6379
      USER_SERVICE_REDIS_PASSWORD: ${SANDBOX_REDIS_PASSWORD}
      USER_SERVICE_REDIS_DB: 0
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started

  product-service:
    image: upo-product-service:online
    build:
      context: ../../..
      dockerfile: services/product-service/Dockerfile
    restart: unless-stopped
    environment:
      PRODUCT_SERVICE_DB_HOST: mysql
      PRODUCT_SERVICE_DB_PORT: 3306
      PRODUCT_SERVICE_DB_NAME: h_product_db
      PRODUCT_SERVICE_DB_USER: ${MYSQL_APP_USER}
      PRODUCT_SERVICE_DB_PASSWORD: ${MYSQL_APP_PASSWORD}
      PRODUCT_SERVICE_JWT_SECRET: ${SANDBOX_JWT_SECRET}
      PRODUCT_SERVICE_JWT_ALGORITHM: HS256
      PRODUCT_SERVICE_REDIS_ENABLED: "true"
      PRODUCT_SERVICE_REDIS_HOST: redis
      PRODUCT_SERVICE_REDIS_PORT: 6379
      PRODUCT_SERVICE_REDIS_PASSWORD: ${SANDBOX_REDIS_PASSWORD}
      PRODUCT_SERVICE_REDIS_DB: 0
      PRODUCT_SERVICE_REDIS_CACHE_TTL_SECONDS: 120
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started

  order-service:
    image: upo-order-service:online
    build:
      context: ../../..
      dockerfile: services/order-service/Dockerfile
    restart: unless-stopped
    environment:
      SERVER_PORT: 8080
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/h_order_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: ${MYSQL_APP_USER}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_APP_PASSWORD}
      APP_PRODUCT_SERVICE_BASE_URL: http://product-service:8002
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: ${RABBITMQ_DEFAULT_USER}
      SPRING_RABBITMQ_PASSWORD: ${RABBITMQ_DEFAULT_PASS}
      SPRING_RABBITMQ_VIRTUAL_HOST: /
      APP_ORDER_EVENTS_EXCHANGE: order.events
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_started
      product-service:
        condition: service_started

  notification-service:
    image: upo-notification-service:online
    build:
      context: ../../..
      dockerfile: services/notification-service/Dockerfile
    restart: unless-stopped
    environment:
      NOTIFICATION_SERVICE_RABBITMQ_HOST: rabbitmq
      NOTIFICATION_SERVICE_RABBITMQ_PORT: 5672
      NOTIFICATION_SERVICE_RABBITMQ_USERNAME: ${RABBITMQ_DEFAULT_USER}
      NOTIFICATION_SERVICE_RABBITMQ_PASSWORD: ${RABBITMQ_DEFAULT_PASS}
      NOTIFICATION_SERVICE_RABBITMQ_VIRTUAL_HOST: /
      NOTIFICATION_SERVICE_EXCHANGE: order.events
      NOTIFICATION_SERVICE_QUEUE_NAME: notification.order.events
      NOTIFICATION_SERVICE_ROUTING_KEYS: order.created,order.cancelled,order.approved,order.rejected
      NOTIFICATION_SERVICE_MONGO_ENABLED: ${SANDBOX_MONGO_ENABLED}
      NOTIFICATION_SERVICE_MONGO_URI: mongodb://${MONGO_INITDB_ROOT_USERNAME}:${MONGO_INITDB_ROOT_PASSWORD}@mongodb:27017/admin?authSource=admin
      NOTIFICATION_SERVICE_MONGO_DATABASE: ${SANDBOX_MONGO_DATABASE}
      NOTIFICATION_SERVICE_MONGO_COLLECTION: ${SANDBOX_MONGO_COLLECTION}
    depends_on:
      rabbitmq:
        condition: service_started
      mongodb:
        condition: service_started

  gateway:
    image: upo-gateway:online
    build:
      context: ../../..
      dockerfile: gateway/Dockerfile
    restart: unless-stopped
    environment:
      GATEWAY_JWT_SECRET: ${SANDBOX_JWT_SECRET}
      GATEWAY_JWT_ALGORITHM: HS256
      GATEWAY_CORS_ORIGINS: '["https://${APP_DOMAIN}","http://${APP_DOMAIN}"]'
      GATEWAY_USER_SERVICE_URL: http://user-service:8001
      GATEWAY_PRODUCT_SERVICE_URL: http://product-service:8002
      GATEWAY_ORDER_SERVICE_URL: http://order-service:8080
      GATEWAY_REDIS_ENABLED: "true"
      GATEWAY_REDIS_HOST: redis
      GATEWAY_REDIS_PORT: 6379
      GATEWAY_REDIS_PASSWORD: ${SANDBOX_REDIS_PASSWORD}
      GATEWAY_REDIS_DB: 0
      GATEWAY_LOGIN_RATE_LIMIT_MAX_REQUESTS: ${GATEWAY_LOGIN_RATE_LIMIT_MAX_REQUESTS}
      GATEWAY_LOGIN_RATE_LIMIT_WINDOW_SECONDS: ${GATEWAY_LOGIN_RATE_LIMIT_WINDOW_SECONDS}
      GATEWAY_ORDER_CREATE_RATE_LIMIT_MAX_REQUESTS: ${GATEWAY_ORDER_CREATE_RATE_LIMIT_MAX_REQUESTS}
      GATEWAY_ORDER_CREATE_RATE_LIMIT_WINDOW_SECONDS: ${GATEWAY_ORDER_CREATE_RATE_LIMIT_WINDOW_SECONDS}
    depends_on:
      user-service:
        condition: service_started
      product-service:
        condition: service_started
      order-service:
        condition: service_started
      redis:
        condition: service_started

  certbot:
    image: certbot/certbot:latest
    container_name: modern-upo-online-certbot
    profiles: ["certbot"]
    volumes:
      - ./runtime/certbot/www:/var/www/certbot
      - ./runtime/letsencrypt:/etc/letsencrypt

volumes:
  mysql_data:
  redis_data:
  rabbitmq_data:
  mongodb_data:
