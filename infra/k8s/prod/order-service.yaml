apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: order-service
  template:
    metadata:
      labels:
        app: order-service
    spec:
      containers:
        - name: order-service
          image: upo-order-service:prod
          imagePullPolicy: Always
          env:
            - name: SERVER_PORT
              value: "8080"
            - name: SPRING_DATASOURCE_URL
              value: jdbc:mysql://modern-upo-prod.cluster-xxxxxxxxxx.us-east-1.rds.amazonaws.com:3306/h_order_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: prod-app-secret
                  key: mysql-app-user
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: prod-app-secret
                  key: mysql-app-password
            - name: APP_PRODUCT_SERVICE_BASE_URL
              value: http://product-service:8002
            - name: SPRING_RABBITMQ_HOST
              valueFrom:
                configMapKeyRef:
                  name: prod-app-config
                  key: rabbitmq-host
            - name: SPRING_RABBITMQ_PORT
              valueFrom:
                configMapKeyRef:
                  name: prod-app-config
                  key: rabbitmq-port
            - name: SPRING_RABBITMQ_USERNAME
              valueFrom:
                secretKeyRef:
                  name: prod-app-secret
                  key: rabbitmq-username
            - name: SPRING_RABBITMQ_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: prod-app-secret
                  key: rabbitmq-password
            - name: SPRING_RABBITMQ_VIRTUAL_HOST
              valueFrom:
                configMapKeyRef:
                  name: prod-app-config
                  key: rabbitmq-vhost
            - name: APP_ORDER_EVENTS_EXCHANGE
              valueFrom:
                configMapKeyRef:
                  name: prod-app-config
                  key: order-events-exchange
            - name: APP_ORDER_EVENTS_OUTBOX_BATCH_SIZE
              valueFrom:
                configMapKeyRef:
                  name: prod-app-config
                  key: order-events-outbox-batch-size
          ports:
            - containerPort: 8080
              name: http
          resources:
            requests:
              cpu: 250m
              memory: 384Mi
            limits:
              cpu: 700m
              memory: 768Mi
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /live
              port: http
            initialDelaySeconds: 40
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: order-service
spec:
  selector:
    app: order-service
  ports:
    - port: 8080
      targetPort: http
