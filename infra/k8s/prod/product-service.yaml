apiVersion: apps/v1
kind: Deployment
metadata:
  name: product-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: product-service
  template:
    metadata:
      labels:
        app: product-service
    spec:
      containers:
        - name: product-service
          image: upo-product-service:prod
          imagePullPolicy: Always
          env:
            - name: PRODUCT_SERVICE_DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: prod-app-config
                  key: mysql-host
            - name: PRODUCT_SERVICE_DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: prod-app-config
                  key: mysql-port
            - name: PRODUCT_SERVICE_DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: prod-app-config
                  key: product-db-name
            - name: PRODUCT_SERVICE_DB_USER
              valueFrom:
                secretKeyRef:
                  name: prod-app-secret
                  key: mysql-app-user
            - name: PRODUCT_SERVICE_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: prod-app-secret
                  key: mysql-app-password
            - name: PRODUCT_SERVICE_REDIS_ENABLED
              value: "true"
            - name: PRODUCT_SERVICE_REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: prod-app-config
                  key: redis-host
            - name: PRODUCT_SERVICE_REDIS_PORT
              valueFrom:
                configMapKeyRef:
                  name: prod-app-config
                  key: redis-port
            - name: PRODUCT_SERVICE_REDIS_DB
              valueFrom:
                configMapKeyRef:
                  name: prod-app-config
                  key: redis-db
            - name: PRODUCT_SERVICE_CACHE_TTL_SECONDS
              valueFrom:
                configMapKeyRef:
                  name: prod-app-config
                  key: product-cache-ttl-seconds
          ports:
            - containerPort: 8002
              name: http
          resources:
            requests:
              cpu: 150m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /live
              port: http
            initialDelaySeconds: 20
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: product-service
spec:
  selector:
    app: product-service
  ports:
    - port: 8002
      targetPort: http
