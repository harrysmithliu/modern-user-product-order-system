apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      containers:
        - name: gateway
          image: upo-gateway:sandbox
          imagePullPolicy: IfNotPresent
          env:
            - name: GATEWAY_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: sandbox-app-secret
                  key: jwt-secret
            - name: GATEWAY_JWT_ALGORITHM
              valueFrom:
                configMapKeyRef:
                  name: sandbox-app-config
                  key: jwt-algorithm
            - name: GATEWAY_CORS_ORIGINS
              valueFrom:
                configMapKeyRef:
                  name: sandbox-app-config
                  key: cors-origins
            - name: GATEWAY_USER_SERVICE_URL
              value: http://user-service:8001
            - name: GATEWAY_PRODUCT_SERVICE_URL
              value: http://product-service:8002
            - name: GATEWAY_ORDER_SERVICE_URL
              value: http://order-service:8080
            - name: GATEWAY_REDIS_ENABLED
              value: "true"
            - name: GATEWAY_REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: sandbox-app-config
                  key: redis-host
            - name: GATEWAY_REDIS_PORT
              valueFrom:
                configMapKeyRef:
                  name: sandbox-app-config
                  key: redis-port
            - name: GATEWAY_REDIS_DB
              valueFrom:
                configMapKeyRef:
                  name: sandbox-app-config
                  key: redis-db
            - name: GATEWAY_LOGIN_RATE_LIMIT_MAX_REQUESTS
              valueFrom:
                configMapKeyRef:
                  name: sandbox-app-config
                  key: login-rate-limit-max-requests
            - name: GATEWAY_LOGIN_RATE_LIMIT_WINDOW_SECONDS
              valueFrom:
                configMapKeyRef:
                  name: sandbox-app-config
                  key: login-rate-limit-window-seconds
            - name: GATEWAY_ORDER_CREATE_RATE_LIMIT_MAX_REQUESTS
              valueFrom:
                configMapKeyRef:
                  name: sandbox-app-config
                  key: order-create-rate-limit-max-requests
            - name: GATEWAY_ORDER_CREATE_RATE_LIMIT_WINDOW_SECONDS
              valueFrom:
                configMapKeyRef:
                  name: sandbox-app-config
                  key: order-create-rate-limit-window-seconds
          ports:
            - containerPort: 8000
              name: http
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /live
              port: http
            initialDelaySeconds: 20
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: gateway
spec:
  selector:
    app: gateway
  ports:
    - port: 8000
      targetPort: http
