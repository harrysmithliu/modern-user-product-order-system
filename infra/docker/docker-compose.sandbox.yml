name: modern-upo-sandbox

services:
  mysql:
    image: mysql:8.4
    container_name: modern-upo-sandbox-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_pass}
    ports:
      - "3307:3306"
    command: ["mysqld", "--character-set-server=utf8mb4", "--collation-server=utf8mb4_0900_ai_ci"]
    volumes:
      - mysql_sandbox_data:/var/lib/mysql
      - ./mysql/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -p$$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 12

  redis:
    image: redis:7.0
    container_name: modern-upo-sandbox-redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_sandbox_data:/data

  rabbitmq:
    image: rabbitmq:3-management
    container_name: modern-upo-sandbox-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-admin}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-admin123}
    ports:
      - "5673:5672"
      - "15673:15672"
    volumes:
      - rabbitmq_sandbox_data:/var/lib/rabbitmq

  mongodb:
    image: mongo:7
    container_name: modern-upo-sandbox-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD:-admin123}
    ports:
      - "27018:27017"
    volumes:
      - mongodb_sandbox_data:/data/db

  user-service:
    image: upo-user-service:sandbox
    build:
      context: ../..
      dockerfile: services/user-service/Dockerfile
    container_name: modern-upo-sandbox-user-service
    restart: unless-stopped
    environment:
      USER_SERVICE_DB_HOST: mysql
      USER_SERVICE_DB_PORT: 3306
      USER_SERVICE_DB_NAME: h_user_db
      USER_SERVICE_DB_USER: ${MYSQL_APP_USER:-app}
      USER_SERVICE_DB_PASSWORD: ${MYSQL_APP_PASSWORD:-app_pass}
      USER_SERVICE_JWT_SECRET: ${SANDBOX_JWT_SECRET:-change-me-in-env}
      USER_SERVICE_JWT_ALGORITHM: HS256
      USER_SERVICE_JWT_EXPIRE_MINUTES: 120
      USER_SERVICE_REDIS_ENABLED: "true"
      USER_SERVICE_REDIS_HOST: ${SANDBOX_REDIS_HOST:-redis}
      USER_SERVICE_REDIS_PORT: ${SANDBOX_REDIS_PORT:-6379}
      USER_SERVICE_REDIS_PASSWORD: ${SANDBOX_REDIS_PASSWORD:-}
      USER_SERVICE_REDIS_DB: 0
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    ports:
      - "8001:8001"

  product-service:
    image: upo-product-service:sandbox
    build:
      context: ../..
      dockerfile: services/product-service/Dockerfile
    container_name: modern-upo-sandbox-product-service
    restart: unless-stopped
    environment:
      PRODUCT_SERVICE_DB_HOST: mysql
      PRODUCT_SERVICE_DB_PORT: 3306
      PRODUCT_SERVICE_DB_NAME: h_product_db
      PRODUCT_SERVICE_DB_USER: ${MYSQL_APP_USER:-app}
      PRODUCT_SERVICE_DB_PASSWORD: ${MYSQL_APP_PASSWORD:-app_pass}
      PRODUCT_SERVICE_SQLALCHEMY_POOL_SIZE: ${SANDBOX_PRODUCT_SQLALCHEMY_POOL_SIZE:-30}
      PRODUCT_SERVICE_SQLALCHEMY_MAX_OVERFLOW: ${SANDBOX_PRODUCT_SQLALCHEMY_MAX_OVERFLOW:-60}
      PRODUCT_SERVICE_SQLALCHEMY_POOL_TIMEOUT_SECONDS: ${SANDBOX_PRODUCT_SQLALCHEMY_POOL_TIMEOUT_SECONDS:-10}
      PRODUCT_SERVICE_SQLALCHEMY_POOL_RECYCLE_SECONDS: ${SANDBOX_PRODUCT_SQLALCHEMY_POOL_RECYCLE_SECONDS:-1800}
      PRODUCT_SERVICE_JWT_SECRET: ${SANDBOX_JWT_SECRET:-change-me-in-env}
      PRODUCT_SERVICE_JWT_ALGORITHM: HS256
      PRODUCT_SERVICE_REDIS_ENABLED: "true"
      PRODUCT_SERVICE_REDIS_HOST: ${SANDBOX_REDIS_HOST:-redis}
      PRODUCT_SERVICE_REDIS_PORT: ${SANDBOX_REDIS_PORT:-6379}
      PRODUCT_SERVICE_REDIS_PASSWORD: ${SANDBOX_REDIS_PASSWORD:-}
      PRODUCT_SERVICE_REDIS_DB: 0
      PRODUCT_SERVICE_REDIS_CACHE_TTL_SECONDS: 120
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    ports:
      - "8002:8002"

  order-service:
    image: upo-order-service:sandbox
    build:
      context: ../..
      dockerfile: services/order-service/Dockerfile
    container_name: modern-upo-sandbox-order-service
    restart: unless-stopped
    environment:
      SERVER_PORT: 8080
      JAVA_TOOL_OPTIONS: >-
        ${SANDBOX_ORDER_JAVA_TOOL_OPTIONS:--Xms1g -Xmx1g -XX:+UseG1GC -XX:MaxGCPauseMillis=200 -XX:MetaspaceSize=256m -XX:MaxMetaspaceSize=512m -XX:+HeapDumpOnOutOfMemoryError}
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/h_order_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: ${MYSQL_APP_USER:-app}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_APP_PASSWORD:-app_pass}
      SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE: ${SANDBOX_ORDER_HIKARI_MAXIMUM_POOL_SIZE:-20}
      SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE: ${SANDBOX_ORDER_HIKARI_MINIMUM_IDLE:-10}
      SPRING_DATASOURCE_HIKARI_CONNECTION_TIMEOUT: ${SANDBOX_ORDER_HIKARI_CONNECTION_TIMEOUT:-3000}
      APP_PRODUCT_SERVICE_BASE_URL: http://product-service:8002
      APP_WORKFLOW_EXTERNAL_SEMAPHORE_PERMITS: ${SANDBOX_ORDER_EXTERNAL_SEMAPHORE_PERMITS:-120}
      APP_WORKFLOW_SEMAPHORE_ACQUIRE_TIMEOUT_MS: ${SANDBOX_ORDER_SEMAPHORE_ACQUIRE_TIMEOUT_MS:-100}
      SPRING_RABBITMQ_HOST: ${SANDBOX_RABBITMQ_HOST:-rabbitmq}
      SPRING_RABBITMQ_PORT: ${SANDBOX_RABBITMQ_PORT:-5672}
      SPRING_RABBITMQ_USERNAME: ${RABBITMQ_DEFAULT_USER:-admin}
      SPRING_RABBITMQ_PASSWORD: ${RABBITMQ_DEFAULT_PASS:-admin123}
      SPRING_RABBITMQ_VIRTUAL_HOST: /
      APP_ORDER_EVENTS_EXCHANGE: ${SANDBOX_ORDER_EVENTS_EXCHANGE:-order.events}
    depends_on:
      mysql:
        condition: service_healthy
      product-service:
        condition: service_started
      rabbitmq:
        condition: service_started
    ports:
      - "8080:8080"

  notification-service:
    image: upo-notification-service:sandbox
    build:
      context: ../..
      dockerfile: services/notification-service/Dockerfile
    container_name: modern-upo-sandbox-notification-service
    restart: unless-stopped
    environment:
      NOTIFICATION_SERVICE_RABBITMQ_HOST: ${SANDBOX_RABBITMQ_HOST:-rabbitmq}
      NOTIFICATION_SERVICE_RABBITMQ_PORT: ${SANDBOX_RABBITMQ_PORT:-5672}
      NOTIFICATION_SERVICE_RABBITMQ_USERNAME: ${RABBITMQ_DEFAULT_USER:-admin}
      NOTIFICATION_SERVICE_RABBITMQ_PASSWORD: ${RABBITMQ_DEFAULT_PASS:-admin123}
      NOTIFICATION_SERVICE_RABBITMQ_VIRTUAL_HOST: /
      NOTIFICATION_SERVICE_EXCHANGE: ${SANDBOX_ORDER_EVENTS_EXCHANGE:-order.events}
      NOTIFICATION_SERVICE_QUEUE_NAME: notification.order.events
      NOTIFICATION_SERVICE_ROUTING_KEYS: order.created,order.cancelled,order.approved,order.rejected
      NOTIFICATION_SERVICE_MONGO_ENABLED: ${SANDBOX_MONGO_ENABLED:-true}
      NOTIFICATION_SERVICE_MONGO_URI: ${SANDBOX_MONGO_URI:-mongodb://admin:admin123@mongodb:27017/admin?authSource=admin}
      NOTIFICATION_SERVICE_MONGO_DATABASE: ${SANDBOX_MONGO_DATABASE:-upo_audit}
      NOTIFICATION_SERVICE_MONGO_COLLECTION: ${SANDBOX_MONGO_COLLECTION:-order_event_timeline}
    depends_on:
      rabbitmq:
        condition: service_started

  gateway:
    image: upo-gateway:sandbox
    build:
      context: ../..
      dockerfile: gateway/Dockerfile
    container_name: modern-upo-sandbox-gateway
    restart: unless-stopped
    environment:
      GATEWAY_JWT_SECRET: ${SANDBOX_JWT_SECRET:-change-me-in-env}
      GATEWAY_JWT_ALGORITHM: HS256
      GATEWAY_UVICORN_WORKERS: ${SANDBOX_GATEWAY_UVICORN_WORKERS:-2}
      GATEWAY_CORS_ORIGINS: '["http://localhost:5173","http://127.0.0.1:5173"]'
      GATEWAY_USER_SERVICE_URL: http://user-service:8001
      GATEWAY_PRODUCT_SERVICE_URL: http://product-service:8002
      GATEWAY_ORDER_SERVICE_URL: http://order-service:8080
      GATEWAY_UPSTREAM_MAX_CONNECTIONS: ${SANDBOX_GATEWAY_UPSTREAM_MAX_CONNECTIONS:-2048}
      GATEWAY_UPSTREAM_MAX_KEEPALIVE_CONNECTIONS: ${SANDBOX_GATEWAY_UPSTREAM_MAX_KEEPALIVE_CONNECTIONS:-512}
      GATEWAY_UPSTREAM_KEEPALIVE_EXPIRY_SECONDS: ${SANDBOX_GATEWAY_UPSTREAM_KEEPALIVE_EXPIRY_SECONDS:-30}
      GATEWAY_REDIS_ENABLED: "true"
      GATEWAY_REDIS_HOST: ${SANDBOX_REDIS_HOST:-redis}
      GATEWAY_REDIS_PORT: ${SANDBOX_REDIS_PORT:-6379}
      GATEWAY_REDIS_PASSWORD: ${SANDBOX_REDIS_PASSWORD:-}
      GATEWAY_REDIS_DB: 0
      GATEWAY_LOGIN_RATE_LIMIT_MAX_REQUESTS: ${SANDBOX_LOGIN_RATE_LIMIT_MAX_REQUESTS:-10}
      GATEWAY_LOGIN_RATE_LIMIT_WINDOW_SECONDS: ${SANDBOX_LOGIN_RATE_LIMIT_WINDOW_SECONDS:-60}
      GATEWAY_ORDER_CREATE_RATE_LIMIT_MAX_REQUESTS: ${SANDBOX_ORDER_CREATE_RATE_LIMIT_MAX_REQUESTS:-20}
      GATEWAY_ORDER_CREATE_RATE_LIMIT_WINDOW_SECONDS: ${SANDBOX_ORDER_CREATE_RATE_LIMIT_WINDOW_SECONDS:-60}
    depends_on:
      user-service:
        condition: service_started
      product-service:
        condition: service_started
      order-service:
        condition: service_started
      redis:
        condition: service_started
    ports:
      - "8000:8000"

  frontend:
    image: upo-frontend:sandbox
    build:
      context: ../..
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:8000
    container_name: modern-upo-sandbox-frontend
    restart: unless-stopped
    depends_on:
      gateway:
        condition: service_started
    ports:
      - "5173:80"

volumes:
  mysql_sandbox_data:
  redis_sandbox_data:
  rabbitmq_sandbox_data:
  mongodb_sandbox_data:
