name: modern-upo-dev

services:
  user-service:
    image: upo-user-service:dev
    build:
      context: ../..
      dockerfile: services/user-service/Dockerfile
    container_name: modern-upo-dev-user-service
    restart: unless-stopped
    environment:
      USER_SERVICE_DB_HOST: ${DEV_DB_HOST:-host.docker.internal}
      USER_SERVICE_DB_PORT: ${DEV_DB_PORT:-3306}
      USER_SERVICE_DB_NAME: h_user_db
      USER_SERVICE_DB_USER: ${DEV_DB_USER:-app}
      USER_SERVICE_DB_PASSWORD: ${DEV_DB_PASSWORD:-app_pass}
      USER_SERVICE_JWT_SECRET: ${DEV_JWT_SECRET:-change-me-in-env}
      USER_SERVICE_JWT_ALGORITHM: HS256
      USER_SERVICE_JWT_EXPIRE_MINUTES: 120
      USER_SERVICE_REDIS_ENABLED: "true"
      USER_SERVICE_REDIS_HOST: ${DEV_REDIS_HOST:-host.docker.internal}
      USER_SERVICE_REDIS_PORT: ${DEV_REDIS_PORT:-6379}
      USER_SERVICE_REDIS_PASSWORD: ${DEV_REDIS_PASSWORD:-}
      USER_SERVICE_REDIS_DB: 0
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8011:8001"

  product-service:
    image: upo-product-service:dev
    build:
      context: ../..
      dockerfile: services/product-service/Dockerfile
    container_name: modern-upo-dev-product-service
    restart: unless-stopped
    environment:
      PRODUCT_SERVICE_DB_HOST: ${DEV_DB_HOST:-host.docker.internal}
      PRODUCT_SERVICE_DB_PORT: ${DEV_DB_PORT:-3306}
      PRODUCT_SERVICE_DB_NAME: h_product_db
      PRODUCT_SERVICE_DB_USER: ${DEV_DB_USER:-app}
      PRODUCT_SERVICE_DB_PASSWORD: ${DEV_DB_PASSWORD:-app_pass}
      PRODUCT_SERVICE_JWT_SECRET: ${DEV_JWT_SECRET:-change-me-in-env}
      PRODUCT_SERVICE_JWT_ALGORITHM: HS256
      PRODUCT_SERVICE_REDIS_ENABLED: "true"
      PRODUCT_SERVICE_REDIS_HOST: ${DEV_REDIS_HOST:-host.docker.internal}
      PRODUCT_SERVICE_REDIS_PORT: ${DEV_REDIS_PORT:-6379}
      PRODUCT_SERVICE_REDIS_PASSWORD: ${DEV_REDIS_PASSWORD:-}
      PRODUCT_SERVICE_REDIS_DB: 0
      PRODUCT_SERVICE_REDIS_CACHE_TTL_SECONDS: 120
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8012:8002"

  order-service:
    image: upo-order-service:dev
    build:
      context: ../..
      dockerfile: services/order-service/Dockerfile
    container_name: modern-upo-dev-order-service
    restart: unless-stopped
    environment:
      SERVER_PORT: 8080
      SPRING_DATASOURCE_URL: jdbc:mysql://${DEV_DB_HOST:-host.docker.internal}:${DEV_DB_PORT:-3306}/h_order_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: ${DEV_DB_USER:-app}
      SPRING_DATASOURCE_PASSWORD: ${DEV_DB_PASSWORD:-app_pass}
      APP_PRODUCT_SERVICE_BASE_URL: http://product-service:8002
      SPRING_RABBITMQ_HOST: ${DEV_RABBITMQ_HOST:-host.docker.internal}
      SPRING_RABBITMQ_PORT: ${DEV_RABBITMQ_PORT:-5672}
      SPRING_RABBITMQ_USERNAME: ${DEV_RABBITMQ_USERNAME:-admin}
      SPRING_RABBITMQ_PASSWORD: ${DEV_RABBITMQ_PASSWORD:-admin123}
      SPRING_RABBITMQ_VIRTUAL_HOST: ${DEV_RABBITMQ_VIRTUAL_HOST:-/}
      APP_ORDER_EVENTS_EXCHANGE: ${DEV_ORDER_EVENTS_EXCHANGE:-order.events}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      product-service:
        condition: service_started
    ports:
      - "8081:8080"

  notification-service:
    image: upo-notification-service:dev
    build:
      context: ../..
      dockerfile: services/notification-service/Dockerfile
    container_name: modern-upo-dev-notification-service
    restart: unless-stopped
    environment:
      NOTIFICATION_SERVICE_RABBITMQ_HOST: ${DEV_RABBITMQ_HOST:-host.docker.internal}
      NOTIFICATION_SERVICE_RABBITMQ_PORT: ${DEV_RABBITMQ_PORT:-5672}
      NOTIFICATION_SERVICE_RABBITMQ_USERNAME: ${DEV_RABBITMQ_USERNAME:-admin}
      NOTIFICATION_SERVICE_RABBITMQ_PASSWORD: ${DEV_RABBITMQ_PASSWORD:-admin123}
      NOTIFICATION_SERVICE_RABBITMQ_VIRTUAL_HOST: ${DEV_RABBITMQ_VIRTUAL_HOST:-/}
      NOTIFICATION_SERVICE_EXCHANGE: ${DEV_ORDER_EVENTS_EXCHANGE:-order.events}
      NOTIFICATION_SERVICE_QUEUE_NAME: notification.order.events
      NOTIFICATION_SERVICE_ROUTING_KEYS: order.created,order.cancelled,order.approved,order.rejected
    extra_hosts:
      - "host.docker.internal:host-gateway"

  gateway:
    image: upo-gateway:dev
    build:
      context: ../..
      dockerfile: gateway/Dockerfile
    container_name: modern-upo-dev-gateway
    restart: unless-stopped
    environment:
      GATEWAY_JWT_SECRET: ${DEV_JWT_SECRET:-change-me-in-env}
      GATEWAY_JWT_ALGORITHM: HS256
      GATEWAY_CORS_ORIGINS: '["http://localhost:5174","http://127.0.0.1:5174"]'
      GATEWAY_USER_SERVICE_URL: http://user-service:8001
      GATEWAY_PRODUCT_SERVICE_URL: http://product-service:8002
      GATEWAY_ORDER_SERVICE_URL: http://order-service:8080
      GATEWAY_REDIS_ENABLED: "true"
      GATEWAY_REDIS_HOST: ${DEV_REDIS_HOST:-host.docker.internal}
      GATEWAY_REDIS_PORT: ${DEV_REDIS_PORT:-6379}
      GATEWAY_REDIS_PASSWORD: ${DEV_REDIS_PASSWORD:-}
      GATEWAY_REDIS_DB: 0
      GATEWAY_LOGIN_RATE_LIMIT_MAX_REQUESTS: ${DEV_LOGIN_RATE_LIMIT_MAX_REQUESTS:-10}
      GATEWAY_LOGIN_RATE_LIMIT_WINDOW_SECONDS: ${DEV_LOGIN_RATE_LIMIT_WINDOW_SECONDS:-60}
      GATEWAY_ORDER_CREATE_RATE_LIMIT_MAX_REQUESTS: ${DEV_ORDER_CREATE_RATE_LIMIT_MAX_REQUESTS:-20}
      GATEWAY_ORDER_CREATE_RATE_LIMIT_WINDOW_SECONDS: ${DEV_ORDER_CREATE_RATE_LIMIT_WINDOW_SECONDS:-60}
    depends_on:
      user-service:
        condition: service_started
      product-service:
        condition: service_started
      order-service:
        condition: service_started
    ports:
      - "8010:8000"

  frontend:
    image: upo-frontend:dev
    build:
      context: ../..
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:8010
    container_name: modern-upo-dev-frontend
    restart: unless-stopped
    depends_on:
      gateway:
        condition: service_started
    ports:
      - "5174:80"
